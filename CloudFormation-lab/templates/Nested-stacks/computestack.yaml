AWSTemplateFormatVersion: "2010-09-09"
Description: Compute stack

Parameters:
  VPC:
    Type: String
  Subnet:
    Type: String
  KeyName:
    Type: AWS::EC2::KeyPair::KeyName

Resources:

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH + HTTP
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  WebInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      ImageId: ami-098e39bafa7e7303d
      SubnetId: !Ref Subnet
      SecurityGroupIds:
        - !Ref WebSecurityGroup

      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo "<h1>Nested Stack Demo /h1>" > /var/www/html/index.html

Outputs:
  PublicIP:
    Value: !GetAtt WebInstance.PublicIp
